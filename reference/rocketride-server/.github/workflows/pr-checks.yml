name: PR checks

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.head.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  label:
    name: Auto-label
    runs-on: ubuntu-latest
    steps:
      - name: Label PR
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  discord-notify:
    needs: [label]
    if: always()
    uses: ./.github/workflows/discord-pr.yml
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: read
    secrets: inherit
