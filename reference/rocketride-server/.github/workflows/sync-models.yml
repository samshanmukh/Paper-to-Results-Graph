name: Sync LLM Models

# Default least-privilege permissions for the workflow. The `sync`
# job below raises to contents:write + pull-requests:write to commit
# updated model manifests and open the PR. Closes Scorecard
# TokenPermissionsID #605.
permissions:
  contents: read

on:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sync-models-${{ hashFiles('tools/sync_models/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sync-models-

      - name: Install sync script dependencies
        run: pip install -r tools/sync_models/requirements.txt

      # Partition providers by whether their API key secret is configured.
      # Providers WITH a key run in strict mode (native API discovery only).
      # Providers WITHOUT a key run with --allow-fallback-discovery (OpenRouter discovery).
      - name: Partition providers by API key availability
        id: partition
        shell: bash
        run: |
          WITH_KEY=""
          WITHOUT_KEY=""

          # Provider name → env var name holding the API key.
          # embedding_openai shares ROCKETRIDE_OPENAI_KEY with llm_openai.
          declare -A PROVIDER_KEY=(
            [llm_openai]=ROCKETRIDE_OPENAI_KEY
            [embedding_openai]=ROCKETRIDE_OPENAI_KEY
            [llm_anthropic]=ROCKETRIDE_ANTHROPIC_KEY
            [llm_gemini]=ROCKETRIDE_GEMINI_KEY
            [llm_mistral]=ROCKETRIDE_MISTRAL_KEY
            [llm_deepseek]=ROCKETRIDE_DEEPSEEK_KEY
            [llm_xai]=ROCKETRIDE_XAI_KEY
            [llm_perplexity]=ROCKETRIDE_PERPLEXITY_KEY
            [llm_qwen]=ROCKETRIDE_QWEN_KEY
            [llm_minimax]=ROCKETRIDE_MINIMAX_KEY
            [llm_kimi]=ROCKETRIDE_KIMI_KEY
          )

          for PROVIDER in "${!PROVIDER_KEY[@]}"; do
            KEY_NAME="${PROVIDER_KEY[$PROVIDER]}"
            KEY_VALUE="${!KEY_NAME:-}"
            if [ -n "$KEY_VALUE" ]; then
              WITH_KEY="$WITH_KEY --provider $PROVIDER"
            else
              WITHOUT_KEY="$WITHOUT_KEY --provider $PROVIDER"
            fi
          done

          echo "with_key=$WITH_KEY" >> "$GITHUB_OUTPUT"
          echo "without_key=$WITHOUT_KEY" >> "$GITHUB_OUTPUT"
          echo "Strict providers: $WITH_KEY"
          echo "Fallback providers: $WITHOUT_KEY"
        env:
          ROCKETRIDE_OPENAI_KEY: ${{ secrets.ROCKETRIDE_OPENAI_KEY }}
          ROCKETRIDE_ANTHROPIC_KEY: ${{ secrets.ROCKETRIDE_ANTHROPIC_KEY }}
          ROCKETRIDE_GEMINI_KEY: ${{ secrets.ROCKETRIDE_GEMINI_KEY }}
          ROCKETRIDE_MISTRAL_KEY: ${{ secrets.ROCKETRIDE_MISTRAL_KEY }}
          ROCKETRIDE_DEEPSEEK_KEY: ${{ secrets.ROCKETRIDE_DEEPSEEK_KEY }}
          ROCKETRIDE_XAI_KEY: ${{ secrets.ROCKETRIDE_XAI_KEY }}
          ROCKETRIDE_PERPLEXITY_KEY: ${{ secrets.ROCKETRIDE_PERPLEXITY_KEY }}
          ROCKETRIDE_QWEN_KEY: ${{ secrets.ROCKETRIDE_QWEN_KEY }}
          ROCKETRIDE_MINIMAX_KEY: ${{ secrets.ROCKETRIDE_MINIMAX_KEY }}
          ROCKETRIDE_KIMI_KEY: ${{ secrets.ROCKETRIDE_KIMI_KEY }}

      # Strict sync: only providers whose API key is configured. Native API
      # discovers and smoke-tests new models. No OpenRouter pollution.
      - name: Sync providers WITH key (strict, native API)
        if: steps.partition.outputs.with_key != ''
        shell: bash
        run: |
          # Capture markdown PR body to a file; tee to stdout so it is also visible in CI logs.
          python tools/sync_models/src/sync_models.py ${{ steps.partition.outputs.with_key }} --enable-discovery --apply --pr-body | tee /tmp/body-strict.md
        env:
          ROCKETRIDE_OPENAI_KEY: ${{ secrets.ROCKETRIDE_OPENAI_KEY }}
          ROCKETRIDE_ANTHROPIC_KEY: ${{ secrets.ROCKETRIDE_ANTHROPIC_KEY }}
          ROCKETRIDE_GEMINI_KEY: ${{ secrets.ROCKETRIDE_GEMINI_KEY }}
          ROCKETRIDE_MISTRAL_KEY: ${{ secrets.ROCKETRIDE_MISTRAL_KEY }}
          ROCKETRIDE_DEEPSEEK_KEY: ${{ secrets.ROCKETRIDE_DEEPSEEK_KEY }}
          ROCKETRIDE_XAI_KEY: ${{ secrets.ROCKETRIDE_XAI_KEY }}
          ROCKETRIDE_PERPLEXITY_KEY: ${{ secrets.ROCKETRIDE_PERPLEXITY_KEY }}
          ROCKETRIDE_QWEN_KEY: ${{ secrets.ROCKETRIDE_QWEN_KEY }}
          ROCKETRIDE_MINIMAX_KEY: ${{ secrets.ROCKETRIDE_MINIMAX_KEY }}
          ROCKETRIDE_KIMI_KEY: ${{ secrets.ROCKETRIDE_KIMI_KEY }}

      # Fallback sync: providers without an API key. OpenRouter / LiteLLM
      # are permitted as discovery sources for these. Smoke tests are skipped
      # (no client). Output may include OpenRouter routing aliases — review
      # the PR body before merging.
      - name: Sync providers WITHOUT key (fallback discovery)
        if: steps.partition.outputs.without_key != ''
        shell: bash
        run: |
          python tools/sync_models/src/sync_models.py ${{ steps.partition.outputs.without_key }} --enable-discovery --allow-fallback-discovery --apply --pr-body | tee /tmp/body-fallback.md

      # Combine the two PR bodies and write a single SYNC_OUTPUT to GITHUB_ENV.
      # This overrides whatever each --pr-body step appended individually.
      - name: Compose combined PR body
        shell: bash
        run: |
          {
            echo 'SYNC_OUTPUT<<SYNC_EOF'
            if [ -s /tmp/body-strict.md ]; then
              echo "## Sync — strict mode (native provider API)"
              echo
              cat /tmp/body-strict.md
              echo
            fi
            if [ -s /tmp/body-fallback.md ]; then
              echo "## Sync — fallback mode (OpenRouter / LiteLLM discovery)"
              echo
              echo "_Providers below were synced without their native API key configured. Discovery used OpenRouter/LiteLLM as a fallback. Verify each newly added model ID against the provider's docs before merging — some may be OpenRouter routing aliases that do not work via the native SDK._"
              echo
              cat /tmp/body-fallback.md
            fi
            echo 'SYNC_EOF'
          } >> "$GITHUB_ENV"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          title: 'chore(models): sync LLM model lists'
          base: develop
          branch: chore/sync-models
          commit-message: 'chore(models): sync LLM model lists'
          delete-branch: true
          body: ${{ env.SYNC_OUTPUT }}
          labels: |
            automated
            models
