name: Discord Discussion Notification

on:
  discussion:
    types: [created, edited, answered, unanswered, labeled, unlabeled, category_changed]
  discussion_comment:
    types: [created]

permissions:
  contents: read
  discussions: write

concurrency:
  group: discord-discussion-${{ github.event.discussion.number }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DISCUSSIONS_WEBHOOK_URL }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout helper script
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/workflows/scripts
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Build embed, post or patch Discord
        run: |
          # ── Guard: bail if webhook is not configured ─────────────────────
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_DISCUSSIONS_WEBHOOK_URL secret is not set — skipping"
            exit 0
          fi

          # ── Source the shared discord_curl helper (retry/backoff + status sink) ──
          # shellcheck source=scripts/discord-helper.sh
          source "${GITHUB_WORKSPACE}/.github/workflows/scripts/discord-helper.sh"

          NUMBER="${{ github.event.discussion.number }}"
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          # ── Fetch discussion via GraphQL (fields only; marker scan is paginated below) ──
          QUERY='query($owner:String!,$name:String!,$number:Int!){
            repository(owner:$owner,name:$name){
              discussion(number:$number){
                id title url number body
                closed
                locked
                comments{ totalCount }
                answerChosenAt
                answer{ url }
                category{ name emoji isAnswerable }
                labels(first:10){ nodes{ name } }
                author{ login avatarUrl }
              }
            }
          }'

          if ! RESULT=$(gh api graphql -f query="$QUERY" \
            -f owner="$OWNER" -f name="$NAME" -F number="$NUMBER") || [ -z "$RESULT" ]; then
            echo "Failed to fetch discussion #$NUMBER — skipping"
            exit 0
          fi

          DISCUSSION=$(echo "$RESULT" | jq '.data.repository.discussion')
          if [ "$DISCUSSION" = "null" ] || [ -z "$DISCUSSION" ]; then
            echo "Discussion #$NUMBER not found (possibly deleted) — skipping"
            exit 0
          fi

          TITLE=$(echo       "$DISCUSSION" | jq -r '.title')
          URL=$(echo         "$DISCUSSION" | jq -r '.url')
          NODE_ID=$(echo     "$DISCUSSION" | jq -r '.id')
          IS_CLOSED=$(echo   "$DISCUSSION" | jq -r '.closed')
          AUTHOR=$(echo      "$DISCUSSION" | jq -r '.author.login')
          AVATAR=$(echo      "$DISCUSSION" | jq -r '.author.avatarUrl')

          CATEGORY_NAME=$(echo  "$DISCUSSION" | jq -r '.category.name')
          CATEGORY_EMOJI=$(echo "$DISCUSSION" | jq -r '.category.emoji // empty')
          IS_ANSWERABLE=$(echo  "$DISCUSSION" | jq -r '.category.isAnswerable')
          ANSWER_CHOSEN=$(echo  "$DISCUSSION" | jq -r '.answerChosenAt // empty')
          ANSWER_URL=$(echo     "$DISCUSSION" | jq -r '.answer.url // empty')
          COMMENT_COUNT=$(echo  "$DISCUSSION" | jq -r '.comments.totalCount')
          # Remove HTML comments and blank lines, keep markdown formatting
          BODY=$(echo "$DISCUSSION" | jq -r '
            (.body // "") |
            # Remove HTML comments (single and multi-line)
            gsub("<!--[\\s\\S]*?-->"; "") |
            # Remove horizontal rules
            gsub("(?m)^\\s*[-*_]{3,}\\s*$"; "") |
            # Collapse multiple newlines into single newline
            gsub("\n\\s*\n+"; "\n") |
            # Trim leading/trailing whitespace
            gsub("^\\s+|\\s+$"; "") |
            # Truncate to 1500 chars
            if length > 1500 then .[:1500] + "..." else . end')

          LABELS=$(echo "$DISCUSSION" | jq -r '[.labels.nodes[].name] | if length==0 then "None" else join(", ") end')

          CATEGORY_DISPLAY="${CATEGORY_EMOJI:+$CATEGORY_EMOJI }$CATEGORY_NAME"

          # ── State + answer status + color ────────────────────────────────
          if [ "$IS_CLOSED" = "true" ]; then
            STATE="🔴 Closed"; COLOR=15158332
          else
            STATE="🔵 Open";   COLOR=3447003
          fi

          ANSWER_STATUS=""
          if [ "$IS_ANSWERABLE" = "true" ]; then
            if [ -n "$ANSWER_CHOSEN" ]; then
              COLOR=3066993
              if [ -n "$ANSWER_URL" ]; then
                ANSWER_STATUS="🟢 [Answered]($ANSWER_URL)"
              else
                ANSWER_STATUS="🟢 Answered"
              fi
            else
              COLOR=15105570
              ANSWER_STATUS="🟡 Unanswered"
            fi
          fi

          # ── Build payload ────────────────────────────────────────────────
          PAYLOAD=$(jq -n \
            --arg  title    "#$NUMBER $TITLE" \
            --arg  url      "$URL" \
            --arg  desc     "$BODY" \
            --arg  author   "$AUTHOR" \
            --arg  avatar   "$AVATAR" \
            --arg  repo     "$REPO" \
            --arg  state    "$STATE" \
            --arg  answer   "$ANSWER_STATUS" \
            --arg  category "$CATEGORY_DISPLAY" \
            --arg  comments "$COMMENT_COUNT" \
            --arg  labels   "$LABELS" \
            --argjson color "$COLOR" \
            '{embeds: [{
              title: $title, url: $url, color: $color,
              description: (if $desc == "" then null else $desc end),
              author: {name: $author, url: ("https://github.com/" + $author), icon_url: $avatar},
              fields: [
                {name: "State",    value: $state,    inline: true},
                (if $answer != "" then {name: "Answer", value: $answer, inline: true} else empty end),
                {name: "Category", value: $category, inline: true},
                {name: "Comments", value: $comments, inline: true},
                {name: "Labels",   value: $labels,   inline: true},
                {name: "Repo",     value: $repo,     inline: true}
              ]
            }]}')

          # ── Paginated marker search (scans every comment page until marker found) ──
          # Uses `first:100, after:$cursor` so markers stay discoverable regardless of
          # discussion size. `last:20` loses markers once a discussion accumulates
          # more than 20 comments and is the root cause of duplicate Discord posts.
          MARKER_QUERY='query($owner:String!,$name:String!,$number:Int!,$after:String){
            repository(owner:$owner,name:$name){
              discussion(number:$number){
                comments(first:100, after:$after){
                  pageInfo{ hasNextPage endCursor }
                  nodes{ id body author{ login } }
                }
              }
            }
          }'

          find_marker() {
            local after="" page m has_next
            while true; do
              if [ -n "$after" ]; then
                page=$(gh api graphql -f query="$MARKER_QUERY" \
                  -f owner="$OWNER" -f name="$NAME" -F number="$NUMBER" -f after="$after")
              else
                page=$(gh api graphql -f query="$MARKER_QUERY" \
                  -f owner="$OWNER" -f name="$NAME" -F number="$NUMBER")
              fi

              # GraphQL returns author.login as "github-actions" (no [bot] suffix);
              # REST returns "github-actions[bot]". Match either to be safe.
              m=$(echo "$page" | jq -c --arg re "$DISCORD_MARKER_PATTERN" '
                [.data.repository.discussion.comments.nodes[]
                  | select((.author.login == "github-actions" or .author.login == "github-actions[bot]")
                    and (.body | test($re)))
                ] | first // empty')

              if [ -n "$m" ] && [ "$m" != "null" ]; then
                echo "$m"
                return 0
              fi

              has_next=$(echo "$page" | jq -r '.data.repository.discussion.comments.pageInfo.hasNextPage')
              [ "$has_next" != "true" ] && return 0
              after=$(echo "$page" | jq -r '.data.repository.discussion.comments.pageInfo.endCursor')
            done
          }

          DISCORD_MSG_ID=""
          MARKER_COMMENT_ID=""
          MARKER=$(find_marker)
          if [ -n "$MARKER" ] && [ "$MARKER" != "null" ]; then
            DISCORD_MSG_ID=$(echo "$MARKER" | jq -r '.body' | extract_discord_marker)
            MARKER_COMMENT_ID=$(echo "$MARKER" | jq -r '.id')
          fi

          # Normalize webhook URL so POST and PATCH share one base. The previous
          # awk-split approach desynced if DISCORD_DISCUSSIONS_WEBHOOK_URL had a
          # trailing slash or query string (e.g. ?thread_id=...): PATCH 404'd,
          # the 404 branch deleted the marker as "message gone", then fell through
          # to POST → fresh repost on every discussion update.
          BASE="${DISCORD_WEBHOOK_URL%%\?*}"
          BASE="${BASE%/}"

          # ── Post or patch ────────────────────────────────────────────────
          if [ -n "$DISCORD_MSG_ID" ]; then
            PATCH_BODY=$(discord_curl -X PATCH \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$BASE/messages/$DISCORD_MSG_ID") || true
            PATCH_STATUS=$(cat "$DISCORD_STATUS_FILE")
            echo "PATCH status: $PATCH_STATUS"

            if [ "$PATCH_STATUS" = "404" ]; then
              # Discord message was deleted — remove stale marker comment
              gh api graphql -f query='mutation($id:ID!){ deleteDiscussionComment(input:{id:$id}){ clientMutationId } }' \
                -f id="$MARKER_COMMENT_ID" || true
              DISCORD_MSG_ID=""
            elif [ "$PATCH_STATUS" != "200" ]; then
              echo "PATCH failed ($PATCH_STATUS): $PATCH_BODY"
              exit 1
            fi
          fi

          if [ -z "$DISCORD_MSG_ID" ]; then
            # --no-retry-5xx makes POST at-most-once per the discord-helper
            # contract: only 429 is safe to retry (request guaranteed rejected);
            # transient 5xx or no-response could each create a duplicate message.
            if ! RESPONSE=$(discord_curl --no-retry-5xx -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$BASE?wait=true"); then
              echo "::error::Discord POST failed (status $(cat "$DISCORD_STATUS_FILE")) after retries"
              exit 1
            fi
            NEW_MSG_ID=$(echo "$RESPONSE" | jq -r '.id')

            # ── Race guard: re-search for a marker created by a concurrent run ──
            EXISTING_MARKER=$(find_marker)

            if [ -n "$EXISTING_MARKER" ] && [ "$EXISTING_MARKER" != "null" ]; then
              # Another run won the race — delete our duplicate message, use theirs
              discord_curl -X DELETE "$BASE/messages/$NEW_MSG_ID" > /dev/null || true
              DISCORD_MSG_ID=$(echo "$EXISTING_MARKER" | jq -r '.body' | extract_discord_marker)
              discord_curl -X PATCH -H "Content-Type: application/json" -d "$PAYLOAD" \
                "$BASE/messages/$DISCORD_MSG_ID" > /dev/null || true
            else
              DISCORD_MSG_ID="$NEW_MSG_ID"
              COMMENT_BODY=$(render_discord_marker "$DISCORD_MSG_ID")
              gh api graphql \
                -f query='mutation($id:ID!,$body:String!){ addDiscussionComment(input:{discussionId:$id,body:$body}){ clientMutationId } }' \
                -f id="$NODE_ID" \
                -f body="$COMMENT_BODY"
            fi
          fi
