name: Stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'  # Daily 1:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please leave a comment to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this PR is still relevant, please leave a comment or push new commits to keep it open.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if this is still relevant.
          close-pr-message: >
            This PR was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if this is still relevant.
          exempt-issue-labels: pinned,security,help wanted,good first issue
          exempt-pr-labels: pinned,security
