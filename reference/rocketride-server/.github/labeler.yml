# yaml-language-server: $schema=https://json.schemastore.org/pull-request-labeler-5.json
module:server:
  - all:
      - changed-files:
          - any-glob-to-any-file:
              - "packages/server/**"
              - "packages/vcpkg/**"
              - "packages/tika/**"
              - "apps/engine/**"
          - all-globs-to-all-files: "!**/scripts/**"

module:nodes:
  - all:
      - changed-files:
          - any-glob-to-any-file: "nodes/**"
          - all-globs-to-all-files: "!**/scripts/**"

module:client-typescript:
  - all:
      - changed-files:
          - any-glob-to-any-file: "packages/client-typescript/**"
          - all-globs-to-all-files: "!**/scripts/**"

module:client-python:
  - all:
      - changed-files:
          - any-glob-to-any-file: "packages/client-python/**"
          - all-globs-to-all-files: "!**/scripts/**"

module:client-mcp:
  - all:
      - changed-files:
          - any-glob-to-any-file: "packages/client-mcp/**"
          - all-globs-to-all-files: "!**/scripts/**"

module:ai:
  - all:
      - changed-files:
          - any-glob-to-any-file: "packages/ai/**"
          - all-globs-to-all-files: "!**/scripts/**"

module:ui:
  - all:
      - changed-files:
          - any-glob-to-any-file:
              - "apps/chat-ui/**"
              - "apps/dropper-ui/**"
              - "packages/shared-ui/**"
          - all-globs-to-all-files: "!**/scripts/**"

module:vscode:
  - all:
      - changed-files:
          - any-glob-to-any-file: "apps/vscode/**"
          - all-globs-to-all-files: "!**/scripts/**"

ci/cd:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

docker:
  - changed-files:
      - any-glob-to-any-file: "docker/**"

builder:
  - changed-files:
      - any-glob-to-any-file: "**/scripts/**"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "**/*.md"
