name: Bug Report
description: Report a bug to help us improve RocketRide
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start the server with '...'
        2. Send request to '...'
        3. Observe error in '...'
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - P0 - Critical (service down, data loss)
        - P1 - High (major feature broken, no workaround)
        - P2 - Medium (feature impaired, workaround exists)
        - P3 - Low (minor inconvenience)
    validations:
      required: true

  - type: checkboxes
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) are affected?
      options:
        - label: Windows
        - label: macOS
        - label: Linux

  - type: input
    id: version
    attributes:
      label: Version / Environment
      description: Which version of RocketRide are you using? Include OS and relevant environment details.
      placeholder: "e.g., v1.2.3 on Ubuntu 22.04, Node 20.x"
    validations:
      required: false

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or log output to help explain the problem.
    validations:
      required: false
