# Gitleaks configuration for RocketRide
# Extends default rules (AWS, GCP, Stripe, GitHub, etc.)
# Adds custom rules for .pipe pipeline files with embedded API keys

[extend]
useDefault = true

# Custom rule: detect hardcoded API keys in .pipe pipeline files
# Matches both `.pipe` and `.pipe.json` (the editor saves as the latter).
[[rules]]
id = "pipe-file-api-key"
description = "Hardcoded API key in .pipe pipeline file"
regex = '''(?i)"(apikey|api_key|secret|token|password|auth)"\s*:\s*"([^"]{8,})"'''
secretGroup = 2
keywords = ["apikey", "api_key", "secret", "token", "password", "auth"]
paths = ['''\.pipe(\.json)?$''']

    [rules.allowlist]
    regexes = [
        '''\$[A-Z_]+''',
        '''\$\{[A-Z_]+\}''',
    ]

# Custom rule: detect hardcoded keys in services.json node configs
[[rules]]
id = "services-json-api-key"
description = "Hardcoded API key in node services.json config"
regex = '''(?i)"(apikey|api_key|secret_key|access_key)"\s*:\s*"([^"]{16,})"'''
secretGroup = 2
keywords = ["apikey", "api_key", "secret_key", "access_key"]
paths = ['''services.*\.json$''']

    [rules.allowlist]
    regexes = [
        '''\$[A-Z_]+''',
        '''\$\{[A-Z_]+\}''',
    ]

# Global allowlist — skip lock files, build output, test fixtures
[allowlist]
paths = [
    '''pnpm-lock\.yaml''',
    '''package-lock\.json''',
    '''\.gitleaks\.toml''',
    '''build/''',
    '''dist/''',
    '''downloads/''',
    '''node_modules/''',
    '''\.claude/''',
]
