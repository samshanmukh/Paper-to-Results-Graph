apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "rocketride.fullname" . }}-test-connection"
  labels:
    {{- include "rocketride.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl-test
      image: curlimages/curl:8.11.1
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi
      command:
        - curl
        - --fail
        - --silent
        - --show-error
        - --max-time
        - "10"
        - http://{{ include "rocketride.fullname" . }}-engine:{{ .Values.engine.service.port }}/ping
