{{/*
WARNING: CPU/memory-based HPA is NOT suitable for GPU inference workloads.
GPU utilization is not visible to the Kubernetes metrics server, so HPA will
not scale based on actual GPU load. For GPU workloads, use KEDA with a
ScaledObject that monitors queue depth or GPU utilization metrics.
See deploy/helm/examples/keda-gpu-scaling.yaml for a working example.
*/}}
{{- if .Values.engine.autoscaling.enabled }}
{{- if and (not .Values.engine.autoscaling.targetCPUUtilizationPercentage) (not .Values.engine.autoscaling.targetMemoryUtilizationPercentage) }}
{{- fail "At least one of engine.autoscaling.targetCPUUtilizationPercentage or engine.autoscaling.targetMemoryUtilizationPercentage must be set when autoscaling is enabled" }}
{{- end }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "rocketride.fullname" . }}-engine
  labels:
    {{- include "rocketride.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "rocketride.fullname" . }}-engine
  minReplicas: {{ .Values.engine.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.engine.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.engine.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.engine.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.engine.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.engine.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
