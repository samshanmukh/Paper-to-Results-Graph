apiVersion: v1
kind: Service
metadata:
  name: {{ include "rocketride.fullname" . }}-engine
  labels:
    {{- include "rocketride.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
spec:
  type: {{ .Values.engine.service.type }}
  ports:
    - port: {{ .Values.engine.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rocketride.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: engine
